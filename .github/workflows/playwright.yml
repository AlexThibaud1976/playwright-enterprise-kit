name: Playwright Tests

# ──────────────────────────────────────────────────────────────────────────────
# Playwright Enterprise Kit - Workflow GitHub Actions
#
# Déclencheurs :
#   - workflow_dispatch : exécution manuelle avec paramètres (BrowserStack)
#   - push/PR sur main  : exécution locale (chromium headless)
#
# Secrets requis (Settings > Secrets and variables > Actions) :
#   Jira/Xray :
#     JIRA_URL, JIRA_USER, JIRA_API_TOKEN
#     XRAY_CLIENT_ID, XRAY_CLIENT_SECRET
#   BrowserStack :
#     BROWSERSTACK_USERNAME, BROWSERSTACK_ACCESS_KEY
#   Confluence (optionnel) :
#     CONFLUENCE_URL, CONFLUENCE_USER, CONFLUENCE_API_TOKEN
#     CONFLUENCE_SPACE_KEY, CONFLUENCE_PAGE_TITLE, CONFLUENCE_PARENT_PAGE_ID
#   Champs personnalisés Jira (optionnel) :
#     JIRA_CUSTOM_FIELD_OS, JIRA_CUSTOM_FIELD_OS_VERSION
#     JIRA_CUSTOM_FIELD_BROWSER, JIRA_CUSTOM_FIELD_BROWSER_VERSION
#     JIRA_CUSTOM_FIELD_TEST_SCOPE
# ──────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

  workflow_dispatch:
    inputs:
      issueKey:
        description: "Jira Test Plan Key (ex: PROJ-100)"
        required: true
      summary:
        description: "Description de l'exécution (optionnel)"
        required: false
      os:
        description: "Système d'exploitation"
        required: true
        type: choice
        options:
          - Windows
          - Mac
      osVersion:
        description: "Version OS (ex: 11, Sonoma, Sequoia)"
        required: true
        type: string
        default: "11"
      browser:
        description: "Navigateur"
        required: true
        type: choice
        options:
          - chrome
          - firefox
          - safari
          - edge
          - chromium
      browserVersion:
        description: "Version navigateur (ex: latest, 131)"
        required: true
        type: string
        default: "latest"
      testScope:
        description: "Périmètre de test"
        required: true
        type: choice
        options:
          # ─── Ajouter ici les scopes correspondant à vos fichiers de test ───
          - all
          - sanity
          - example
          # Exemples :
          # - login
          # - checkout
          # - catalog
          # ────────────────────────────────────────────────────────────────────
      confluenceReport:
        description: "Publier le rapport sur Confluence"
        required: false
        type: boolean
        default: false

env:
  # ── À personnaliser ─────────────────────────────────────────────────────────
  XRAY_ENDPOINT: xray.cloud.getxray.app
  JIRA_PROJECT_KEY: MYPROJECT   # <-- Remplacer par la clé de votre projet Jira
  # ────────────────────────────────────────────────────────────────────────────

jobs:
  # ============================================================================
  # CI locale - Push / PR (sans BrowserStack)
  # ============================================================================
  test-local:
    if: ${{ github.event_name != 'workflow_dispatch' }}
    timeout-minutes: 30
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run tests
        run: npx playwright test
        env:
          BASE_URL: ${{ vars.BASE_URL || 'http://localhost:3000' }}
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  # ============================================================================
  # BrowserStack - Exécution manuelle avec paramètres
  # ============================================================================
  test-browserstack:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    timeout-minutes: 90
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate & resolve BrowserStack configuration
        shell: bash
        run: |
          node scripts/resolve-browserstack-config.js \
            --os "${{ github.event.inputs.os }}" \
            --osVersion "${{ github.event.inputs.osVersion }}" \
            --browser "${{ github.event.inputs.browser }}" \
            --browserVersion "${{ github.event.inputs.browserVersion }}"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright (chromium driver for BrowserStack)
        run: npx playwright install chromium

      # ──────────────────────────────────────────────────────────────────────
      # Determine test pattern from scope
      # ──────────────────────────────────────────────────────────────────────
      - name: Determine test pattern
        id: test-pattern
        shell: bash
        run: |
          SCOPE="${{ github.event.inputs.testScope }}"
          case "$SCOPE" in
            "all")
              echo "pattern=tests/" >> $GITHUB_OUTPUT
              echo "description=All Tests" >> $GITHUB_OUTPUT
              ;;
            "sanity")
              echo "pattern=tests/example/01-sanity.spec.ts" >> $GITHUB_OUTPUT
              echo "description=Sanity Tests" >> $GITHUB_OUTPUT
              ;;
            "example")
              echo "pattern=tests/example/" >> $GITHUB_OUTPUT
              echo "description=Example Tests" >> $GITHUB_OUTPUT
              ;;
            # ── Ajouter ici vos scopes personnalisés ──────────────────────
            # "login")
            #   echo "pattern=tests/auth/login.spec.ts" >> $GITHUB_OUTPUT
            #   echo "description=Login Tests" >> $GITHUB_OUTPUT
            #   ;;
            # "checkout")
            #   echo "pattern=tests/checkout/" >> $GITHUB_OUTPUT
            #   echo "description=Checkout Tests" >> $GITHUB_OUTPUT
            #   ;;
            # ─────────────────────────────────────────────────────────────
            *)
              echo "pattern=tests/" >> $GITHUB_OUTPUT
              echo "description=All Tests" >> $GITHUB_OUTPUT
              ;;
          esac

      # ──────────────────────────────────────────────────────────────────────
      # Exécution des tests sur BrowserStack
      # ──────────────────────────────────────────────────────────────────────
      - name: Run tests on BrowserStack
        id: run-tests
        run: npx playwright test ${{ steps.test-pattern.outputs.pattern }} --config=playwright.config.browserstack.js
        env:
          BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
          BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
          BROWSERSTACK_BUILD_NAME: "GitHub Actions #${{ github.run_number }} - ${{ github.ref_name }} - ${{ env.DEVICE_NAME }} - ${{ steps.test-pattern.outputs.description }}"
          BASE_URL: ${{ vars.BASE_URL || 'http://localhost:3000' }}
          BS_WORKERS: "5"
          CI: true
        continue-on-error: true

      # ──────────────────────────────────────────────────────────────────────
      # Post-exécution
      # ──────────────────────────────────────────────────────────────────────
      - name: Fetch BrowserStack build link
        if: always()
        id: bs-link
        shell: bash
        env:
          BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
          BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
          BROWSERSTACK_BUILD_NAME: "GitHub Actions #${{ github.run_number }} - ${{ github.ref_name }} - ${{ env.DEVICE_NAME }} - ${{ steps.test-pattern.outputs.description }}"
        run: node scripts/get-browserstack-build-link.js

      - name: Add timestamps to Xray report
        if: always()
        run: node scripts/add-timestamps-to-xray-report.js xray-report.xml

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report-${{ env.DEVICE_NAME || 'run' }}
          path: |
            playwright-report/
            xray-report.xml
          retention-days: 30

      # ──────────────────────────────────────────────────────────────────────
      # Upload vers Xray (crée une Test Execution dans Jira)
      # ──────────────────────────────────────────────────────────────────────
      - name: Upload results to Xray
        if: always()
        id: xray-upload
        shell: pwsh
        env:
          XRAY_CLIENT_ID: ${{ secrets.XRAY_CLIENT_ID }}
          XRAY_CLIENT_SECRET: ${{ secrets.XRAY_CLIENT_SECRET }}
          JIRA_USER: ${{ secrets.JIRA_USER }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_URL: ${{ secrets.JIRA_URL }}
        run: |
          ./scripts/upload-xray.ps1 -IssueKey "${{ github.event.inputs.issueKey }}"

      # ──────────────────────────────────────────────────────────────────────
      # Déterminer le résultat depuis le XML
      # ──────────────────────────────────────────────────────────────────────
      - name: Determine test result
        if: always()
        id: test-result
        shell: bash
        run: |
          if [ -f "xray-report.xml" ]; then
            FAILURES=$(grep -oP 'failures="\K[0-9]+' xray-report.xml | head -1)
            ERRORS=$(grep -oP 'errors="\K[0-9]+' xray-report.xml | head -1)
            if [ "$FAILURES" = "0" ] && [ "$ERRORS" = "0" ]; then
              echo "result=PASS" >> $GITHUB_OUTPUT
              echo "All tests passed"
            else
              echo "result=FAIL" >> $GITHUB_OUTPUT
              echo "Tests failed: $FAILURES failures, $ERRORS errors"
            fi
          else
            echo "result=UNKNOWN" >> $GITHUB_OUTPUT
            echo "XML report not found"
          fi

      # ──────────────────────────────────────────────────────────────────────
      # Enrichissement de la Test Execution Jira
      # ──────────────────────────────────────────────────────────────────────
      - name: Update Jira Test Execution
        if: ${{ always() && steps.xray-upload.outputs.exec_key != '' }}
        shell: pwsh
        env:
          JIRA_CUSTOM_FIELD_OS: ${{ secrets.JIRA_CUSTOM_FIELD_OS }}
          JIRA_CUSTOM_FIELD_OS_VERSION: ${{ secrets.JIRA_CUSTOM_FIELD_OS_VERSION }}
          JIRA_CUSTOM_FIELD_BROWSER: ${{ secrets.JIRA_CUSTOM_FIELD_BROWSER }}
          JIRA_CUSTOM_FIELD_BROWSER_VERSION: ${{ secrets.JIRA_CUSTOM_FIELD_BROWSER_VERSION }}
          JIRA_CUSTOM_FIELD_TEST_SCOPE: ${{ secrets.JIRA_CUSTOM_FIELD_TEST_SCOPE }}
        run: |
          ./scripts/jira-post-execution.ps1 `
            -ExecKey "${{ steps.xray-upload.outputs.exec_key }}" `
            -DeviceName "${{ env.DEVICE_NAME }}" `
            -TestResult "${{ steps.test-result.outputs.result }}" `
            -TestScope "${{ steps.test-pattern.outputs.description }}" `
            -JiraUrl "${{ secrets.JIRA_URL }}" `
            -JiraUser "${{ secrets.JIRA_USER }}" `
            -JiraApiToken "${{ secrets.JIRA_API_TOKEN }}" `
            -GitHubRepository "${{ github.repository }}" `
            -GitHubRunId "${{ github.run_id }}" `
            -GitHubRunNumber "${{ github.run_number }}" `
            -BrowserStackBuildUrl "${{ steps.bs-link.outputs.build_url }}"

      # ──────────────────────────────────────────────────────────────────────
      # Rapport Confluence (optionnel, toggle via confluenceReport)
      # ──────────────────────────────────────────────────────────────────────
      - name: Update Confluence Report
        if: ${{ always() && github.event.inputs.confluenceReport == 'true' }}
        shell: bash
        env:
          CONFLUENCE_URL: ${{ secrets.CONFLUENCE_URL }}
          CONFLUENCE_USER: ${{ secrets.CONFLUENCE_USER }}
          CONFLUENCE_API_TOKEN: ${{ secrets.CONFLUENCE_API_TOKEN }}
          CONFLUENCE_SPACE_KEY: ${{ secrets.CONFLUENCE_SPACE_KEY }}
          CONFLUENCE_PAGE_TITLE: ${{ secrets.CONFLUENCE_PAGE_TITLE }}
          CONFLUENCE_PARENT_PAGE_ID: ${{ secrets.CONFLUENCE_PARENT_PAGE_ID }}
          JIRA_URL: ${{ secrets.JIRA_URL }}
        run: |
          node scripts/update-confluence-report.js \
            --exec-key "${{ steps.xray-upload.outputs.exec_key }}" \
            --test-result "${{ steps.test-result.outputs.result }}" \
            --test-scope "${{ steps.test-pattern.outputs.description }}" \
            --run-number "${{ github.run_number }}" \
            --run-id "${{ github.run_id }}" \
            --repository "${{ github.repository }}" \
            --browserstack-url "${{ steps.bs-link.outputs.build_url }}"

      # ──────────────────────────────────────────────────────────────────────
      # Fail le job si des tests ont échoué
      # ──────────────────────────────────────────────────────────────────────
      - name: Check test results
        if: always()
        shell: bash
        run: |
          if [ "${{ steps.run-tests.outcome }}" == "failure" ]; then
            echo "Tests failed"
            exit 1
          fi
